<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>for my baby.</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>happy 20th birthday to my boy!</h1>

  <!-- Cake Container -->
  <div class="cake-container">
  <div class="cake-layer layer3"></div>
  <div class="cake-layer layer2"></div>
  <div class="cake-layer layer1"></div>

  <div class="candles"></div> <!-- JS will generate 20 small candles -->
</div>

  <!-- Balloons -->
  <div class="balloon balloon1"></div>
<div class="balloon balloon2"></div>
<div class="balloon balloon3"></div>
<div class="balloon balloon4"></div>
<div class="balloon balloon5"></div>
<div class="balloon balloon6"></div>
<div class="balloon balloon7"></div>
<div class="balloon balloon8"></div>


  <!-- Birthday Card -->
  <div class="birthday-card">
  <span class="card-front">Rabiî.</div>
  <div class="card-book">
    <div class="book-inner">
      <div class="page" id="page-left"></div>
      <div class="page" id="page-right"></div>
    </div>
    <div class="page-number" id="page-number"></div>
  </div>
</div>

  <!-- Background music -->
  <audio id="birthday-song" loop>
    <source src="https://www.orangefreesounds.com/wp-content/uploads/2016/08/Happy-birthday-instrumental.mp3">
    Your browser does not support the audio element.
  </audio>

  <script src="script.js"></script>
</body>
</html>
